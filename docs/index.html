<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Study Guide — Agentic AI</title>
    <style>
      :root {
        --bg: #0e0f11;
        --bg2: #161719;
        --bg3: #1e2023;
        --border: rgba(255, 255, 255, 0.08);
        --border2: rgba(255, 255, 255, 0.15);
        --text: #e8e6df;
        --muted: #8a8880;
        --accent: #7c6af5;
        --accent2: #4ec9b0;
        --accent3: #f4a04a;
        --accent4: #e85d6a;
        --tag-bg: rgba(124, 106, 245, 0.12);
        --tag-border: rgba(124, 106, 245, 0.3);
        --done-bg: rgba(78, 201, 176, 0.1);
        --done-border: rgba(78, 201, 176, 0.3);
        --code-bg: #0a0b0d;
        --font: "Segoe UI", system-ui, sans-serif;
        --mono: "Fira Code", "Cascadia Code", monospace;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font);
        font-size: 15px;
        line-height: 1.65;
        min-height: 100vh;
      }

      /* Sidebar + main layout */
      .layout {
        display: flex;
        min-height: 100vh;
      }
      .sidebar {
        width: 260px;
        flex-shrink: 0;
        background: var(--bg2);
        border-right: 1px solid var(--border);
        padding: 24px 0;
        position: sticky;
        top: 0;
        height: 100vh;
        overflow-y: auto;
        scrollbar-width: thin;
      }
      .sidebar-title {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
        padding: 0 20px 12px;
      }
      .nav-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 20px;
        cursor: pointer;
        font-size: 13.5px;
        color: var(--muted);
        border-left: 2px solid transparent;
        transition: all 0.15s;
      }
      .nav-item:hover {
        color: var(--text);
        background: rgba(255, 255, 255, 0.03);
      }
      .nav-item.active {
        color: var(--text);
        border-left-color: var(--accent);
        background: rgba(124, 106, 245, 0.07);
      }
      .nav-item .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--border2);
        flex-shrink: 0;
        transition: background 0.2s;
      }
      .nav-item.done .dot {
        background: var(--accent2);
      }
      .nav-item.active .dot {
        background: var(--accent);
      }

      .main {
        flex: 1;
        padding: 40px 48px;
        max-width: 860px;
      }

      /* Header */
      .hero {
        margin-bottom: 40px;
      }
      .hero-eyebrow {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 10px;
      }
      .hero h1 {
        font-size: 32px;
        font-weight: 700;
        line-height: 1.2;
        margin-bottom: 12px;
      }
      .hero h1 span {
        color: var(--accent);
      }
      .hero p {
        color: var(--muted);
        max-width: 560px;
      }
      .progress-wrap {
        margin-top: 20px;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .progress-bar-outer {
        flex: 1;
        height: 4px;
        background: var(--bg3);
        border-radius: 2px;
        overflow: hidden;
      }
      .progress-bar-inner {
        height: 100%;
        background: linear-gradient(90deg, var(--accent), var(--accent2));
        border-radius: 2px;
        transition: width 0.4s;
      }
      .progress-label {
        font-size: 12px;
        color: var(--muted);
        white-space: nowrap;
      }

      /* Section */
      .section {
        display: none;
      }
      .section.active {
        display: block;
      }
      .section-header {
        margin-bottom: 28px;
      }
      .section-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: var(--tag-bg);
        border: 1px solid var(--tag-border);
        color: var(--accent);
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        padding: 4px 10px;
        border-radius: 4px;
        margin-bottom: 12px;
      }
      .section h2 {
        font-size: 24px;
        font-weight: 700;
        margin-bottom: 8px;
      }
      .section-intro {
        color: var(--muted);
        max-width: 640px;
      }

      /* Topic cards */
      .topic-card {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 10px;
        margin-bottom: 20px;
        overflow: hidden;
        transition: border-color 0.2s;
      }
      .topic-card:hover {
        border-color: var(--border2);
      }
      .topic-card.completed {
        border-color: var(--done-border);
      }

      .card-header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 16px 20px;
        cursor: pointer;
        user-select: none;
      }
      .card-icon {
        width: 36px;
        height: 36px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        flex-shrink: 0;
      }
      .card-icon.purple {
        background: rgba(124, 106, 245, 0.15);
      }
      .card-icon.teal {
        background: rgba(78, 201, 176, 0.12);
      }
      .card-icon.amber {
        background: rgba(244, 160, 74, 0.12);
      }
      .card-icon.red {
        background: rgba(232, 93, 106, 0.12);
      }

      .card-title {
        font-weight: 600;
        font-size: 15px;
        flex: 1;
      }
      .card-meta {
        font-size: 12px;
        color: var(--muted);
        margin-top: 2px;
      }
      .card-toggle {
        font-size: 18px;
        color: var(--muted);
        transition: transform 0.2s;
        line-height: 1;
      }
      .card-toggle.open {
        transform: rotate(180deg);
      }
      .card-check {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        border: 1.5px solid var(--border2);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        flex-shrink: 0;
        transition: all 0.2s;
        font-size: 11px;
        color: transparent;
      }
      .card-check.checked {
        background: var(--accent2);
        border-color: var(--accent2);
        color: #0e0f11;
      }

      .card-body {
        display: none;
        padding: 0 20px 20px;
      }
      .card-body.open {
        display: block;
      }

      /* Concept explanation */
      .concept-text {
        color: var(--text);
        opacity: 0.85;
        margin-bottom: 16px;
        line-height: 1.7;
      }

      /* Example box */
      .example-box {
        background: var(--code-bg);
        border: 1px solid var(--border);
        border-left: 3px solid var(--accent);
        border-radius: 6px;
        padding: 14px 16px;
        margin-bottom: 14px;
      }
      .example-label {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 8px;
      }
      pre {
        font-family: var(--mono);
        font-size: 12.5px;
        line-height: 1.6;
        color: #c8d0dc;
        white-space: pre-wrap;
        word-break: break-all;
      }

      /* Keywords + tips */
      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 12px;
      }
      .tag {
        font-size: 11px;
        padding: 3px 9px;
        border-radius: 4px;
        background: var(--tag-bg);
        border: 1px solid var(--tag-border);
        color: var(--accent);
      }
      .tip {
        background: rgba(244, 160, 74, 0.07);
        border: 1px solid rgba(244, 160, 74, 0.2);
        border-radius: 6px;
        padding: 10px 14px;
        font-size: 13px;
        color: #e8c98c;
        margin-top: 12px;
      }
      .tip b {
        color: var(--accent3);
      }

      /* Quiz */
      .quiz-section {
        margin-top: 20px;
      }
      .quiz-q {
        font-weight: 600;
        margin-bottom: 10px;
        font-size: 14px;
      }
      .quiz-options {
        display: flex;
        flex-direction: column;
        gap: 7px;
      }
      .quiz-opt {
        padding: 9px 14px;
        border-radius: 6px;
        border: 1px solid var(--border2);
        cursor: pointer;
        font-size: 13.5px;
        background: var(--bg3);
        transition: all 0.15s;
      }
      .quiz-opt:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .quiz-opt.correct {
        background: var(--done-bg);
        border-color: var(--done-border);
        color: var(--accent2);
      }
      .quiz-opt.wrong {
        background: rgba(232, 93, 106, 0.08);
        border-color: rgba(232, 93, 106, 0.3);
        color: var(--accent4);
      }
      .quiz-feedback {
        margin-top: 10px;
        font-size: 13px;
        color: var(--muted);
        display: none;
        padding: 8px 12px;
        background: var(--bg3);
        border-radius: 6px;
      }
      .quiz-feedback.show {
        display: block;
      }

      /* Divider */
      .divider {
        height: 1px;
        background: var(--border);
        margin: 20px 0;
      }

      /* Bottom nav */
      .bottom-nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 36px;
        padding-top: 24px;
        border-top: 1px solid var(--border);
      }
      .btn {
        padding: 9px 20px;
        border-radius: 7px;
        font-size: 13.5px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.15s;
        border: 1px solid var(--border2);
        background: var(--bg3);
        color: var(--text);
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .btn.primary {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }
      .btn.primary:hover {
        opacity: 0.88;
      }
      .btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }

      @media (max-width: 700px) {
        .sidebar {
          display: none;
        }
        .main {
          padding: 24px 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <!-- Sidebar -->
      <nav class="sidebar">
        <div class="sidebar-title">Study Guide</div>
        <div id="nav-items"></div>
      </nav>

      <!-- Main -->
      <main class="main">
        <!-- Hero -->
        <div class="hero">
          <div class="hero-eyebrow">Agent· Agentic AI</div>
          <h1>Master <span>Agent Development</span></h1>
          <p>
            A comprehensive study guide covering all major topics — from core
            concepts to production-ready multi-agent systems.
          </p>
          <div class="progress-wrap">
            <div class="progress-bar-outer">
              <div
                class="progress-bar-inner"
                id="prog-bar"
                style="width: 0%"
              ></div>
            </div>
            <div class="progress-label" id="prog-label">0 / 0 completed</div>
          </div>
        </div>

        <!-- All sections injected by JS -->
        <div id="sections-root"></div>

        <div class="bottom-nav">
          <button class="btn" id="btn-prev" onclick="navigate(-1)">
            ← Previous
          </button>
          <span
            id="page-indicator"
            style="font-size: 13px; color: var(--muted)"
          ></span>
          <button class="btn primary" id="btn-next" onclick="navigate(1)">
            Next →
          </button>
        </div>
      </main>
    </div>

    <script>
      const SECTIONS = [
        {
          id: "foundations",
          label: "1. AI Agent Foundations",
          badge: "Foundations",
          icon: "🤖",
          iconColor: "purple",
          intro:
            "Understand what an AI agent is, how it perceives and acts, and why it differs from a standard chatbot.",
          topics: [
            {
              title: "What is an AI Agent?",
              meta: "Core concept",
              icon: "🧠",
              iconColor: "purple",
              body: `An AI agent is a system that perceives its environment, reasons about a goal, and takes actions to achieve it — autonomously, without step-by-step human instruction.

Unlike a chatbot that simply responds to prompts, an agent plans, uses tools, adapts, and can loop through multiple steps until the goal is reached.`,
              example: {
                label: "Conceptual example",
                code: `# Simple agent loop (pseudocode)
goal = "Research the top 5 AI startups in 2025"

while not goal_achieved:
    thought = llm.think(goal, context)      # Reason
    action  = llm.choose_tool(thought)      # Plan
    result  = tools.run(action)             # Act
    context.append(result)                  # Observe
    goal_achieved = llm.check_done(context) # Evaluate`,
              },
              tags: ["ReAct loop", "Sense-Plan-Act", "Autonomy", "Tool use"],
              tip: "Key distinction: a chatbot responds once; an agent runs a loop until the task is done.",
              quiz: {
                q: "What makes an AI agent different from a standard LLM chatbot?",
                options: [
                  "It uses a larger model",
                  "It loops, plans, and takes actions until a goal is met",
                  "It responds faster",
                  "It requires no prompts",
                ],
                correct: 1,
                feedback:
                  "An agent runs an action-observe loop, uses tools, and adapts — unlike a one-shot chatbot response.",
              },
            },
            {
              title: "The ReAct Loop (Reason + Act)",
              meta: "Core pattern",
              icon: "🔄",
              iconColor: "teal",
              body: `ReAct (Reason + Act) is the foundational pattern for agent behavior. The agent alternates between:
1. Thought — internal reasoning about what to do next
2. Action — calling a tool or performing a step
3. Observation — reading the result and updating context

This loop continues until the agent concludes the task is complete.`,
              example: {
                label: "ReAct trace example",
                code: `Thought: I need to find current AI funding data. I'll search the web.
Action: web_search("AI startup funding 2025")
Observation: ["Anthropic raised $4B", "OpenAI valued at $157B"...]

Thought: I have data. Now I'll organize by funding amount.
Action: python_repl(sort_and_format(data))
Observation: Formatted table returned.

Thought: Task complete. I'll compose the final answer.
Final Answer: Here are the top 5 AI startups by funding in 2025...`,
              },
              tags: ["ReAct", "Thought-Action-Observation", "Chain-of-thought"],
              tip: "Claude Code, LangChain agents, and OpenAI Assistants all implement variations of the ReAct loop internally.",
              quiz: {
                q: "In a ReAct loop, what comes AFTER the Thought step?",
                options: [
                  "Another Thought",
                  "Final Answer",
                  "Action",
                  "User input",
                ],
                correct: 2,
                feedback:
                  "Thought → Action → Observation → Thought. The loop keeps going until the agent has enough information to answer.",
              },
            },
            {
              title: "Agent Components: Tools, Memory, Planning",
              meta: "Architecture",
              icon: "🔧",
              iconColor: "amber",
              body: `Every agent architecture has three pillars:

• Tools — functions the agent can call (search, code exec, APIs, file I/O)
• Memory — short-term (context window) and long-term (vector DB, files)
• Planning — how it breaks goals into steps (sequential, hierarchical, or parallel)

These three components combine to determine what an agent can do and how well it does it.`,
              example: {
                label: "Defining a tool in Python (OpenAI Agents SDK)",
                code: `from agents import function_tool

@function_tool
def search_web(query: str) -> str:
    """Search the web for up-to-date information."""
    return brave_search(query)

@function_tool
def run_python(code: str) -> str:
    """Execute Python code and return output."""
    return sandbox.exec(code)

agent = Agent(
    name="Research Agent",
    tools=[search_web, run_python],
    instructions="You are a research agent. Use tools to answer questions."
)`,
              },
              tags: ["Tools", "Memory", "Planning", "Context window"],
              tip: "Tools are just functions with typed signatures and a docstring — the LLM reads the docstring to decide when to call it.",
              quiz: {
                q: "What is 'long-term memory' for an AI agent?",
                options: [
                  "The context window",
                  "A larger model",
                  "External storage like a vector database or files",
                  "The system prompt",
                ],
                correct: 2,
                feedback:
                  "The context window is short-term (session-only). Long-term memory requires external storage that persists across sessions.",
              },
            },
          ],
        },
        {
          id: "claude-code",
          label: "2. Claude Code",
          badge: "Claude Code",
          icon: "💻",
          iconColor: "teal",
          intro:
            "Master Anthropic's AI coding agent — hooks, skills, MCP integration, and proven workflows.",
          topics: [
            {
              title: "Claude Code Fundamentals",
              meta: "Getting started",
              icon: "⚡",
              iconColor: "teal",
              body: `Claude Code is Anthropic's agentic coding assistant. It runs in the terminal, has access to your entire codebase, and can read/write files, run commands, and search the web.

Key features:
• Full filesystem access within your project
• Can run bash commands and tests
• Maintains context across a session
• Supports hooks for custom automation
• Skills (SKILL.md files) for persistent, reusable instructions`,
              example: {
                label: "Basic Claude Code session",
                code: `# Start Claude Code in your project directory
$ cd my-project
$ claude

> Add error handling to all API calls in src/api/

# Claude will:
# 1. Read relevant files
# 2. Plan the changes
# 3. Edit files
# 4. Run tests to verify
# 5. Report what it changed`,
              },
              tags: [
                "Terminal agent",
                "File editing",
                "Code generation",
                "Test runner",
              ],
              tip: "Always open Claude Code from the root of your project — it uses the working directory to scope its context.",
              quiz: {
                q: "What makes Claude Code an 'agent' rather than just a code assistant?",
                options: [
                  "It's faster",
                  "It can read, edit files, run commands, and loop until the task is done",
                  "It only generates code",
                  "It works without a terminal",
                ],
                correct: 1,
                feedback:
                  "Claude Code takes actions (file edits, bash commands), observes results, and iterates — the full agentic loop.",
              },
            },
            {
              title: "Hooks — Automating Claude Code Behavior",
              meta: "Advanced feature",
              icon: "🪝",
              iconColor: "purple",
              body: `Hooks let you run custom code at specific points in Claude Code's lifecycle:

• PreToolUse — runs before Claude calls a tool
• PostToolUse — runs after a tool call returns
• Stop — runs when Claude finishes a task
• Notification — runs on certain events

Use hooks to: auto-format code, enforce policies, log activity, trigger CI/CD, or send notifications.`,
              example: {
                label:
                  "claude_hooks.json — run prettier after every file write",
                code: `{
  "hooks": {
    "PostToolUse": [
      {
        "matcher": "Write",
        "hooks": [
          {
            "type": "command",
            "command": "npx prettier --write $CLAUDE_TOOL_INPUT_PATH"
          }
        ]
      }
    ],
    "Stop": [
      {
        "hooks": [
          {
            "type": "command",
            "command": "npm test -- --silent"
          }
        ]
      }
    ]
  }
}`,
              },
              tags: [
                "Hooks",
                "Automation",
                "PostToolUse",
                "PreToolUse",
                "Stop",
              ],
              tip: "Hooks are defined in claude_hooks.json at the project root. They run as shell commands, so you can call any script.",
              quiz: {
                q: "Which hook type runs automatically after every Claude Code session ends?",
                options: ["PreToolUse", "PostToolUse", "Stop", "Init"],
                correct: 2,
                feedback:
                  "The 'Stop' hook fires when Claude finishes a task — perfect for running tests or sending notifications.",
              },
            },
            {
              title: "Skills (SKILL.md) — Reusable Agent Instructions",
              meta: "Customization",
              icon: "📚",
              iconColor: "amber",
              body: `Skills are markdown files that teach Claude Code how to handle specific tasks in your project. Place a SKILL.md inside a folder and Claude will read it when it enters that folder.

Skills are discoverable at session start and work across agents (Claude Code, GitHub Copilot, etc.). They encode your team's conventions, preferred libraries, and patterns.`,
              example: {
                label: "SKILL.md — defining a skill for API route creation",
                code: `---
name: create-api-route
description: Use when creating new Express API routes
---

## Pattern
Always use async/await with try-catch.
Routes live in src/routes/<resource>.ts.
Export a router, not individual handlers.

## Template
\`\`\`typescript
import { Router, Request, Response } from 'express';
const router = Router();

router.get('/', async (req: Request, res: Response) => {
  try {
    // implementation
    res.json({ data });
  } catch (error) {
    res.status(500).json({ error: error.message });
  }
});

export default router;
\`\`\``,
              },
              tags: ["SKILL.md", "Skills", "Conventions", "Reusable"],
              tip: "Put SKILL.md files in the directories they apply to — a skills/ in the root for global patterns, and subdirectory SKILL.md files for feature-specific guidance.",
              quiz: {
                q: "When does Claude Code discover SKILL.md files?",
                options: [
                  "Only when explicitly told to read them",
                  "At session start, by scanning the project directory",
                  "Only in the root folder",
                  "When you type /skills",
                ],
                correct: 1,
                feedback:
                  "Skills are discovered at session start. Claude scans the directory structure and loads any SKILL.md files it finds.",
              },
            },
            {
              title: "MCP Integration in Claude Code",
              meta: "Tooling",
              icon: "🔌",
              iconColor: "red",
              body: `MCP (Model Context Protocol) lets Claude Code connect to external data sources and tools through a standardized interface. You configure MCP servers in .mcp.json and Claude Code automatically gains access to their tools.

Common MCP servers: GitHub, Slack, Notion, databases, Figma, and custom internal tools.`,
              example: {
                label: ".mcp.json — connecting GitHub and a database",
                code: `{
  "mcpServers": {
    "github": {
      "command": "npx",
      "args": ["-y", "@modelcontextprotocol/server-github"],
      "env": { "GITHUB_TOKEN": "\${GITHUB_TOKEN}" }
    },
    "postgres": {
      "command": "npx",
      "args": ["-y", "@modelcontextprotocol/server-postgres"],
      "env": {
        "POSTGRES_CONNECTION_STRING": "\${DB_URL}"
      }
    }
  }
}`,
              },
              tags: [
                "MCP",
                "Model Context Protocol",
                ".mcp.json",
                "External tools",
              ],
              tip: "MCP servers run as local processes. Claude Code communicates with them over stdin/stdout using the MCP protocol.",
              quiz: {
                q: "Where do you configure MCP servers for Claude Code?",
                options: [
                  "SKILL.md",
                  "claude_hooks.json",
                  ".mcp.json",
                  "package.json",
                ],
                correct: 2,
                feedback:
                  ".mcp.json in the project root (or home directory for global servers) is where you define MCP server connections.",
              },
            },
          ],
        },
        {

              .map(
                (o, oi) => `
              <div class="quiz-opt" onclick="answerQuiz('${id}', ${oi}, ${t.quiz.correct})">${o}</div>
            `,
              )
              .join("")}
          </div>
          <div class="quiz-feedback" id="qfb-${id}"></div>
        </div>
      </div>
    </div>`;
      }

      function escHtml(s) {
        return s
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      // ---- Interactions ----
      function toggleCard(id) {
        const body = document.getElementById("body-" + id);
        const tog = document.getElementById("toggle-" + id);
        const isOpen = body.classList.contains("open");
        body.classList.toggle("open", !isOpen);
        tog.classList.toggle("open", !isOpen);
      }

      function markDone(id) {
        if (completed.has(id)) {
          completed.delete(id);
        } else {
          completed.add(id);
          // Auto-open the card
          const body = document.getElementById("body-" + id);
          if (!body.classList.contains("open")) toggleCard(id);
        }
        saveCompleted();
        // Update check button
        const check = document.getElementById("check-" + id);
        const isDone = completed.has(id);
        check.className = "card-check" + (isDone ? " checked" : "");
        check.textContent = isDone ? "✓" : "";
        // Update card border
        document.getElementById("card-" + id).className =
          "topic-card" + (isDone ? " completed" : "");
        renderProgress();
        renderNav();
      }

      function answerQuiz(id, chosen, correct) {
        const opts = document.querySelectorAll(`#quiz-${id} .quiz-opt`);
        opts.forEach((o, i) => {
          o.classList.remove("correct", "wrong");
          if (i === correct) o.classList.add("correct");
          else if (i === chosen && chosen !== correct) o.classList.add("wrong");
          o.style.pointerEvents = "none";
        });
        const fb = document.getElementById("qfb-" + id);
        const [si, ti] = id.split("-").map(Number);
        fb.textContent =
          (chosen === correct ? "✓ Correct! " : "✗ Not quite. ") +
          SECTIONS[si].topics[ti].quiz.feedback;
        fb.classList.add("show");
        if (chosen === correct) markDone(id);
      }

      function goToSection(i) {
        currentSection = i;
        renderNav();
        renderSections();
        renderPageIndicator();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function navigate(dir) {
        const next = currentSection + dir;
        if (next >= 0 && next < SECTIONS.length) goToSection(next);
      }

      function renderPageIndicator() {
        document.getElementById("page-indicator").textContent =
          `Section ${currentSection + 1} of ${SECTIONS.length}`;
        document.getElementById("btn-prev").disabled = currentSection === 0;
        document.getElementById("btn-next").disabled =
          currentSection === SECTIONS.length - 1;
      }

      // ---- Init ----
      function init() {
        renderNav();
        renderSections();
        renderProgress();
        renderPageIndicator();
      }

      init();
    </script>
  </body>
</html>
